<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玻璃杯AI生成可视化设计系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', -apple-system, sans-serif;
            background: #f5f6f8;
            color: #1f2329;
            min-height: 100vh;
            padding: 32px 20px;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { margin-bottom: 28px; }
        .header h1 { font-size: 22px; font-weight: 600; color: #1f2329; }
        .header p { font-size: 14px; color: #8a919e; margin-top: 6px; }
        /* 左右两列等高：右列内容多时左列 card 同步撑高 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-height: calc(100vh - 80px);
            align-items: stretch;
        }
        .card {
            background: #fff; border: 1px solid #eaecef; border-radius: 10px; padding: 24px;
            display: flex; flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }
        .card-title {
            font-size: 16px; font-weight: 600; color: #1f2329; margin-bottom: 20px;
            padding-bottom: 12px; border-bottom: 1px solid #eaecef;
        }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #4e5969; }
        .input-group textarea {
            width: 100%; padding: 12px; border: 1px solid #dcdfe6; border-radius: 8px;
            font-size: 14px; resize: vertical; min-height: 96px; transition: border-color 0.2s;
            font-family: inherit;
        }
        .input-group textarea:focus { outline: none; border-color: #4c6ef5; }
        .btn {
            background: #4c6ef5; color: #fff; border: none; padding: 10px 24px; border-radius: 8px;
            font-size: 14px; cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: #3b5bdb; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
            flex: 1;
            align-content: start;
        }
        .image-item {
            aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer;
            border: 2px solid transparent; transition: border-color 0.2s;
        }
        .image-item:hover { border-color: #c0c9ff; }
        .image-item.selected { border-color: #4c6ef5; }
        .image-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .loading { text-align: center; padding: 36px; color: #8a919e; }
        .spinner {
            border: 3px solid #eaecef; border-top: 3px solid #4c6ef5; border-radius: 50%;
            width: 32px; height: 32px; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid #eaecef; }
        .result-title { font-size: 14px; font-weight: 600; color: #4e5969; margin-bottom: 14px; }
        .param-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .param-table th, .param-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eaecef; }
        .param-table th { color: #8a919e; font-weight: 500; }
        .chart-container { width: 100%; height: 300px; margin-top: 8px; }
        .comparison-section { grid-column: span 2; }
        .comparison-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .comparison-box { padding: 18px; border-radius: 8px; border: 1px solid #eaecef; }
        .comparison-box.aesthetic { background: #fafafa; }
        .comparison-box.optimized { background: #f4f7ff; border-color: #d6e0ff; }
        .comparison-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #1f2329; }
        .stat-item {
            display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px;
            color: #4e5969; border-bottom: 1px solid #eaecef;
        }
        .stat-item:last-child { border-bottom: none; }
        /* 设计列表独立滚动：内容超长时在 card 内滚动，不撑爆整页 */
        .design-list {
            flex: 1;
            min-height: 0;
            overflow-y: scroll;  /* 总是显示滚动条，避免内容刚好不溢出时滚动条闪烁 */
            padding-right: 4px;
        }
        .design-item {
            padding: 14px; border: 1px solid #eaecef; border-radius: 8px; margin-bottom: 10px;
            cursor: pointer; transition: border-color 0.2s;
        }
        .design-item:hover { border-color: #c0c9ff; background: #fafbff; }
        .design-item .design-prompt { font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #1f2329; }
        .design-item .design-date { font-size: 12px; color: #a9afba; }
        .design-actions { margin-top: 10px; }
        .btn-small {
            padding: 4px 12px; font-size: 12px; border-radius: 6px; border: 1px solid #f0a0a0;
            cursor: pointer; background: #fff; color: #e5484d;
        }
        .btn-small:hover { background: #fff0f0; }
        .empty-state { text-align: center; padding: 36px; color: #a9afba; font-size: 14px; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; margin-left: 8px; }
        .tag.optimized { background: #eaf3ff; color: #4c6ef5; }
        .tag.pending { background: #fff4e6; color: #e8850c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>玻璃杯AI生成可视化设计系统</h1>
            <p>基于文生图模型 + MOPSO多目标优化，实现外观设计与工艺制造协同优化</p>
        </div>

        <div class="main-content">
            <!-- 左侧：设计生成 -->
            <div class="card">
                <div class="card-title">个性化设计生成</div>
                <div class="input-group">
                    <label for="prompt">输入设计需求（中文）：</label>
                    <textarea id="prompt" placeholder="例如：简约风格，圆柱形，透明玻璃，适合咖啡饮用..."></textarea>
                </div>
                <button class="btn" id="generateBtn">生成设计方案</button>

                <div id="loadingArea" style="display: none;">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>正在调用AI生成设计图，约需1-2分钟，请稍候...</p>
                    </div>
                </div>

                <div id="imageArea" style="display: none;">
                    <div class="result-title">生成的设计方案：</div>
                    <div class="image-grid" id="imageGrid"></div>
                    <p style="margin-top: 15px; font-size: 14px; color: #666;">点击选择一张图片进行工艺优化</p>
                    <button class="btn" id="optimizeBtn" style="margin-top: 15px; display: none;">开始工艺参数优化</button>
                </div>
            </div>

            <!-- 右侧：设计列表 -->
            <div class="card">
                <div class="card-title">设计方案列表</div>
                <div class="design-list" id="designList">
                    <div class="empty-state">暂无设计方案，开始生成第一个吧！</div>
                </div>
            </div>

            <!-- 下方：优化结果 -->
            <div class="card comparison-section" id="resultCard" style="display: none;">
                <div class="card-title">工艺优化结果</div>
                <div class="comparison-grid">
                    <div class="comparison-box aesthetic">
                        <div class="comparison-title">纯美学生成（参考基准）</div>
                        <div class="stat-item"><span>壁厚均匀度</span><span>~8.0%</span></div>
                        <div class="stat-item"><span>成品废品率</span><span>~12.0%</span></div>
                        <div class="stat-item"><span>加工能耗</span><span>~8000</span></div>
                        <div class="stat-item"><span>耐热安全性</span><span>~60.0%</span></div>
                    </div>
                    <div class="comparison-box optimized">
                        <div class="comparison-title">美学 + 工艺约束优化</div>
                        <div class="stat-item"><span>壁厚均匀度</span><span id="optUniformity">-</span></div>
                        <div class="stat-item"><span>成品废品率</span><span id="optDefect">-</span></div>
                        <div class="stat-item"><span>加工能耗</span><span id="optEnergy">-</span></div>
                        <div class="stat-item"><span>耐热安全性</span><span id="optHeat">-</span></div>
                    </div>
                </div>

                <div class="result-section">
                    <div class="result-title">最优工艺参数：</div>
                    <table class="param-table">
                        <thead>
                            <tr><th>参数名称</th><th>优化值</th><th>约束范围</th></tr>
                        </thead>
                        <tbody id="paramTableBody">
                            <tr><td colspan="3">暂无优化结果</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="result-section">
                    <div class="result-title">算法收敛曲线：</div>
                    <div class="chart-container" id="convergenceChart"></div>
                </div>

                <div class="result-section">
                    <div class="result-title">帕累托前沿分布：</div>
                    <div class="chart-container" id="paretoChart"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDesign = null;
        let selectedImageIndex = -1;
        let convergenceChart = null;
        let paretoChart = null;

        const paramRanges = {
            "heating_temp": "550-700°C",
            "heating_time": "30-180s",
            "blowing_pressure": "0.1-0.5MPa",
            "blowing_time": "5-30s",
            "cooling_rate": "10-50°C/min",
            "wall_thickness_target": "2-5mm"
        };
        const paramNames = {
            "heating_temp": "加热温度",
            "heating_time": "加热时间",
            "blowing_pressure": "吹制压力",
            "blowing_time": "吹制时间",
            "cooling_rate": "冷却速率",
            "wall_thickness_target": "目标壁厚"
        };

        function initCharts() {
            convergenceChart = echarts.init(document.getElementById('convergenceChart'));
            paretoChart = echarts.init(document.getElementById('paretoChart'));
        }

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) { alert('请输入设计需求'); return; }

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            document.getElementById('loadingArea').style.display = 'block';
            document.getElementById('imageArea').style.display = 'none';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await response.json();
                if (data.success) {
                    currentDesign = data.design;
                    displayImages(data.design.images);
                    loadDesignList();
                } else {
                    alert('生成失败：' + data.error);
                }
            } catch (error) {
                alert('请求失败：' + error.message);
            } finally {
                btn.disabled = false;
                document.getElementById('loadingArea').style.display = 'none';
            }
        });

        function displayImages(images) {
            const grid = document.getElementById('imageGrid');
            grid.innerHTML = '';
            images.forEach((imgUrl, index) => {
                const div = document.createElement('div');
                div.className = 'image-item';
                div.innerHTML = `<img src="${imgUrl}" alt="设计图${index+1}">`;
                div.addEventListener('click', () => selectImage(index));
                grid.appendChild(div);
            });
            document.getElementById('imageArea').style.display = 'block';
            document.getElementById('optimizeBtn').style.display = 'none';
            selectedImageIndex = -1;
        }

        function selectImage(index) {
            selectedImageIndex = index;
            document.querySelectorAll('.image-item').forEach((item, i) => {
                item.classList.toggle('selected', i === index);
            });
            if (currentDesign) {
                currentDesign.selected_image = currentDesign.images[index];
            }
            document.getElementById('optimizeBtn').style.display = 'block';
        }

        document.getElementById('optimizeBtn').addEventListener('click', async () => {
            if (!currentDesign) return;
            const btn = document.getElementById('optimizeBtn');
            btn.disabled = true;
            btn.textContent = '优化中...';
            try {
                const response = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ design_id: currentDesign.id })
                });
                const data = await response.json();
                if (data.success) {
                    currentDesign = data.design;
                    displayOptimizationResult(currentDesign.optimization_result);
                    loadDesignList();
                } else {
                    alert('优化失败：' + data.error);
                }
            } catch (error) {
                alert('请求失败：' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '开始工艺参数优化';
            }
        });

        function displayOptimizationResult(result) {
            if (!result) return;
            const { params, objectives, iteration_history, pareto_front } = result;

            document.getElementById('optUniformity').textContent = objectives.wall_uniformity + '%';
            document.getElementById('optDefect').textContent = objectives.defect_rate + '%';
            document.getElementById('optEnergy').textContent = objectives.energy_consumption;
            document.getElementById('optHeat').textContent = objectives.heat_resistance + '%';

            const tbody = document.getElementById('paramTableBody');
            tbody.innerHTML = '';
            Object.entries(params).forEach(([key, value]) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${paramNames[key] || key}</td>
                    <td>${typeof value === 'number' ? value.toFixed(2) : value}</td>
                    <td>${paramRanges[key] || '-'}</td>`;
                tbody.appendChild(row);
            });

            updateConvergenceChart(iteration_history);
            updateParetoChart(pareto_front);

            const card = document.getElementById('resultCard');
            card.style.display = 'block';
            card.scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => {
                if (convergenceChart) convergenceChart.resize();
                if (paretoChart) paretoChart.resize();
            }, 100);
        }

        function updateConvergenceChart(history) {
            if (!history || !convergenceChart) return;
            const generations = history.map(h => h.generation);
            const option = {
                tooltip: { trigger: 'axis' },
                legend: { data: ['壁厚均匀度', '废品率', '能耗', '耐热性'] },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: generations, name: '迭代代数' },
                yAxis: [
                    { type: 'value', name: '%', position: 'left' },
                    { type: 'value', name: '能耗', position: 'right' }
                ],
                series: [
                    { name: '壁厚均匀度', type: 'line', data: history.map(h => h.avg_wall_uniformity) },
                    { name: '废品率', type: 'line', data: history.map(h => h.avg_defect_rate) },
                    { name: '能耗', type: 'line', yAxisIndex: 1, data: history.map(h => h.avg_energy) },
                    { name: '耐热性', type: 'line', data: history.map(h => h.avg_heat_resistance) }
                ]
            };
            convergenceChart.setOption(option);
        }

        function updateParetoChart(paretoData) {
            if (!paretoData || !paretoChart) return;
            const data = paretoData.map(p => [p.objectives.wall_uniformity, p.objectives.energy_consumption]);
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: (params) => {
                        const p = paretoData[params.dataIndex];
                        return `均匀度: ${p.objectives.wall_uniformity}%<br>能耗: ${p.objectives.energy_consumption}<br>废品率: ${p.objectives.defect_rate}%<br>耐热性: ${p.objectives.heat_resistance}%`;
                    }
                },
                xAxis: { name: '壁厚均匀度 (%)', type: 'value', scale: true },
                yAxis: { name: '加工能耗', type: 'value', scale: true },
                series: [{
                    name: '帕累托解', type: 'scatter', data: data,
                    symbolSize: 12, itemStyle: { color: '#667eea' }
                }]
            };
            paretoChart.setOption(option);
        }

        async function loadDesignList() {
            try {
                const response = await fetch('/api/designs');
                const data = await response.json();
                if (data.success) displayDesignList(data.designs);
            } catch (error) {
                console.error('加载设计列表失败:', error);
            }
        }

        function displayDesignList(designs) {
            const list = document.getElementById('designList');
            if (!designs || designs.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无设计方案，开始生成第一个吧！</div>';
                return;
            }
            list.innerHTML = '';
            designs.slice().reverse().forEach(design => {
                const item = document.createElement('div');
                item.className = 'design-item';
                item.innerHTML = `
                    <div class="design-prompt">${design.prompt}
                        <span class="tag ${design.optimization_result ? 'optimized' : 'pending'}">
                            ${design.optimization_result ? '已优化' : '待优化'}
                        </span>
                    </div>
                    <div class="design-date">创建时间：${design.created_at}</div>
                    <div class="design-actions">
                        <button class="btn-small" data-id="${design.id}">删除</button>
                    </div>`;
                item.querySelector('.btn-small').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteDesign(design.id);
                });
                item.addEventListener('click', () => selectDesign(design));
                list.appendChild(item);
            });
        }

        async function deleteDesign(designId) {
            if (!confirm('确定删除该设计方案吗？')) return;
            try {
                await fetch('/api/designs/' + designId, { method: 'DELETE' });
                loadDesignList();
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }

        function selectDesign(design) {
            currentDesign = design;
            if (design.images) {
                displayImages(design.images);
                if (design.selected_image) {
                    const index = design.images.indexOf(design.selected_image);
                    if (index !== -1) selectImage(index);
                }
            }
            if (design.optimization_result) {
                displayOptimizationResult(design.optimization_result);
            } else {
                document.getElementById('resultCard').style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            loadDesignList();
            window.addEventListener('resize', () => {
                if (convergenceChart) convergenceChart.resize();
                if (paretoChart) paretoChart.resize();
            });
        });
    </script>
</body>
</html>
